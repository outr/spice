openapi: '3.2.0'
info:
  title: 'Sample API'
  version: '0.1.9'
  description: 'Optional multiline or single-line description in [CommonMark](https://commonmark.org/help/) or HTML.'
servers:
  - url: 'https://api.example.com/v1'
    description: 'Optional server description, e.g. Main (production) server'
  - url: 'https://staging-api.example.com'
    description: 'Optional server description, e.g. Internal staging server for testing'
paths:
  /users:
    get:
      summary: 'Returns a list of users.'
      description: 'Optional extended description in CommonMark or HTML.'
      responses:
        200:
          description: 'A JSON array of users'
          content:
            application/json:
              schema:
                type: 'array'
                items:
                  $ref: '#/components/schemas/spec.OpenAPIServerSpec.User'
components:
  schemas:
    spec.OpenAPIServerSpec.User:
      type: 'object'
      properties:
        name:
          type: 'string'
        type:
          $ref: '#/components/schemas/spec.OpenAPIServerSpec.UserType'
      required:
        - 'name'
        - 'type'
      x-full-class: 'spec.OpenAPIServerSpec.User'
    spec.OpenAPIServerSpec.UserType:
      type: 'string'
      description: 'spec.OpenAPIServerSpec.UserType'
      enum:
        - 'Admin'
        - 'Basic'
      x-full-class: 'spec.OpenAPIServerSpec.UserType'