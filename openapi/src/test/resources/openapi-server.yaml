openapi: '3.2.0'
info:
  title: 'Example Server'
  version: '1.0'
servers:
  - url: 'http://127.0.0.1:8080/'
  - url: 'https://127.0.0.1'
paths:
  /reverse:
    post:
      summary: 'Reverses text'
      description: 'Reverses text'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReverseRequest'
      responses:
        200:
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReverseResponse'
  /combine:
    post:
      summary: 'Combines the values of an enum'
      description: 'Combines the values of an enum'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CombineRequest'
      responses:
        200:
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CombineResponse'
  /upload:
    post:
      summary: 'Uploads a file'
      description: 'Uploads a file'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: 'object'
              properties:
                userId:
                  type: 'string'
                file:
                  type: 'string'
                  format: 'binary'
              required:
                - 'userId'
                - 'file'
              x-full-class: 'spec.OpenAPIHttpServerSpec.FileUploadRequest'
      responses:
        200:
          description: 'OK'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
components:
  schemas:
    Auth:
      type: 'object'
      properties:
        username:
          type: 'string'
        password:
          type: 'string'
      required:
        - 'username'
        - 'password'
      x-full-class: 'spec.OpenAPIHttpServerSpec.Auth'
    CombineRequest:
      type: 'object'
      properties:
        auth:
          $ref: '#/components/schemas/Auth'
        map:
          type: 'object'
          additionalProperties:
            $ref: '#/components/schemas/NumEnum'
      required:
        - 'auth'
        - 'map'
      x-full-class: 'spec.OpenAPIHttpServerSpec.CombineRequest'
    CombineResponse:
      type: 'object'
      properties:
        list:
          type: 'array'
          items:
            $ref: '#/components/schemas/NumEnum'
        error:
          type:
            - 'string'
            - 'null'
      required:
        - 'list'
      x-full-class: 'spec.OpenAPIHttpServerSpec.CombineResponse'
    FileUploadResponse:
      type: 'object'
      properties:
        userId:
          type: 'string'
        length:
          type: 'integer'
      required:
        - 'userId'
        - 'length'
      x-full-class: 'spec.OpenAPIHttpServerSpec.FileUploadResponse'
    NumEnum:
      type: 'string'
      description: 'spec.OpenAPIHttpServerSpec.NumEnum'
      enum:
        - 'One'
        - 'Two'
        - 'Three'
      x-full-class: 'spec.OpenAPIHttpServerSpec.NumEnum'
    ReverseRequest:
      type: 'object'
      properties:
        auth:
          $ref: '#/components/schemas/Auth'
        text:
          type: 'string'
      required:
        - 'auth'
        - 'text'
      x-full-class: 'spec.OpenAPIHttpServerSpec.ReverseRequest'
    ReverseResponse:
      type: 'object'
      properties:
        text:
          type:
            - 'string'
            - 'null'
        error:
          type:
            - 'string'
            - 'null'
      x-full-class: 'spec.OpenAPIHttpServerSpec.ReverseResponse'